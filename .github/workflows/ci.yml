name: CI

on:
  push:
    branches: [master, main]
  pull_request:

jobs:
  server:
    name: Server (build, unit, integration)
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: prima
          POSTGRES_PASSWORD: prima
          POSTGRES_DB: prima_pm_test
        ports: ['5432:5432']
        options: >-
          --health-cmd "pg_isready -U prima"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    defaults:
      run:
        working-directory: server
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: server/package-lock.json
      - run: npm ci
      - run: npx prisma generate
      - name: Type-check + build
        run: npm run build
      - name: Unit tests
        run: npm test
      - name: Migrate test database
        run: npx prisma migrate deploy
        env:
          DATABASE_URL: postgresql://prima:prima@localhost:5432/prima_pm_test?schema=public
      - name: Integration tests (HTTP + DB)
        run: npm run test:integration

  client:
    name: Client (type-check, build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: client
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: client/package-lock.json
      - run: npm ci
      - run: npm run typecheck
      - run: npm test
      - run: npm run build

  e2e:
    name: E2E (login / RBAC)
    runs-on: ubuntu-latest
    needs: [server, client] # only run once build + unit tests are green
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: prima
          POSTGRES_PASSWORD: prima
          POSTGRES_DB: prima_pm_test
        ports: ['5432:5432']
        options: >-
          --health-cmd "pg_isready -U prima"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      # Playwright auto-boots the server (config reads DATABASE_URL) against this seeded DB.
      DATABASE_URL: postgresql://prima:prima@localhost:5432/prima_pm_test?schema=public
      # src/config/env.ts requires these at import time — the seed loads server modules, so
      # they must be present (any value; the seed only creates users, it never signs a token).
      JWT_ACCESS_SECRET: ci-e2e-access
      JWT_REFRESH_SECRET: ci-e2e-refresh
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Server deps + migrate + seed the test DB
        working-directory: server
        run: |
          npm ci
          npx prisma generate
          npx prisma migrate deploy
          npm run db:seed
      - name: Client deps
        working-directory: client
        run: npm ci
      - name: E2E deps + Chromium
        working-directory: e2e
        run: |
          npm ci
          npx playwright install --with-deps chromium
      - name: Run login / RBAC e2e (auth.spec)
        working-directory: e2e
        # Point the suite at the SEED accounts (all Password123!) instead of the live-DB defaults.
        env:
          E2E_ADMIN_EMAIL: admin@prismatix.id
          E2E_PM_EMAIL: pm@prismatix.id
          E2E_FINANCE_EMAIL: finance@prismatix.id
          E2E_ADMIN_PASSWORD: Password123!
          E2E_PM_PASSWORD: Password123!
          E2E_FINANCE_PASSWORD: Password123!
        run: npx playwright test tests/auth.spec.ts --reporter=list
      - name: Upload Playwright artifacts on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-playwright-report
          path: e2e/test-results/
          retention-days: 7
