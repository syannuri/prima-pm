# Prismatix — nginx reverse proxy for a LAN / on-prem host reached BY IP (no public
# domain), using a LOCAL CA cert. See docs/DEPLOYMENT.md (Path B).
#
# Replace 192.168.1.150 / myhost with your server's LAN IP / hostname, and generate
# the certs into /etc/nginx/certs/ per the DEPLOYMENT guide before reloading.
#
# Install:
#   sudo cp deploy/nginx/prismatix-lan.conf /etc/nginx/sites-available/prismatix
#   sudo ln -sf /etc/nginx/sites-available/prismatix /etc/nginx/sites-enabled/prismatix
#   sudo rm -f /etc/nginx/sites-enabled/default
#   sudo nginx -t && sudo systemctl reload nginx

# Port 80: serve the local CA cert for easy per-device install, redirect the rest to https.
server {
    listen 80;
    listen [::]:80;
    server_name 192.168.1.150 myhost;     # <-- your LAN IP + hostname
    server_tokens off;

    location = /prismatix-ca.crt {
        alias /etc/nginx/certs/ca.crt;
        default_type application/x-x509-ca-cert;
        add_header Content-Disposition 'attachment; filename="prismatix-ca.crt"';
    }
    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    server_name 192.168.1.150 myhost;     # <-- your LAN IP + hostname
    server_tokens off;

    ssl_certificate     /etc/nginx/certs/server.crt;
    ssl_certificate_key /etc/nginx/certs/server.key;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_session_cache   shared:SSL:5m;
    ssl_session_timeout 1h;

    # The app caps uploads at 10 MB; nginx defaults to 1 MB, which would break them.
    client_max_body_size 12m;

    # Also downloadable over https (once the CA is trusted).
    location = /prismatix-ca.crt {
        alias /etc/nginx/certs/ca.crt;
        default_type application/x-x509-ca-cert;
        add_header Content-Disposition 'attachment; filename="prismatix-ca.crt"';
    }

    location / {
        proxy_pass         http://127.0.0.1:4000;   # the Node app, bound to loopback
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 300s;
    }
}
