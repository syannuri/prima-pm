# Prismatix — nginx reverse proxy for a PUBLIC DOMAIN on a VPS / cloud host.
# TLS is issued & renewed by Let's Encrypt (certbot). See docs/DEPLOYMENT.md (Path A).
#
# Install:
#   sudo cp deploy/nginx/prismatix-domain.conf /etc/nginx/sites-available/prismatix
#   sudo ln -sf /etc/nginx/sites-available/prismatix /etc/nginx/sites-enabled/prismatix
#   sudo rm -f /etc/nginx/sites-enabled/default        # drop the catch-all default
#   # edit: replace pm.example.com with your domain
#   sudo nginx -t && sudo systemctl reload nginx
#   sudo certbot --nginx -d pm.example.com             # obtains the cert AND injects the
#                                                      # :443 server block + http→https redirect
#
# After certbot runs, this file will also contain a `listen 443 ssl` block it manages.
# You normally only maintain the :80 block below; certbot owns the TLS bits.

server {
    listen 80;
    listen [::]:80;
    server_name pm.example.com;          # <-- your domain

    # Don't advertise the nginx version in the Server header / error pages.
    server_tokens off;

    # The app caps uploads at 10 MB; nginx defaults to 1 MB, which would break them.
    client_max_body_size 12m;

    location / {
        proxy_pass         http://127.0.0.1:4000;   # the Node app, bound to loopback
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;   # app reads this for SECURE/HSTS
        proxy_read_timeout 300s;
    }
}

# ----------------------------------------------------------------------------
# After `sudo certbot --nginx -d pm.example.com` you'll get (managed by certbot):
#
# server {
#     listen 443 ssl;
#     listen [::]:443 ssl;
#     server_name pm.example.com;
#     ssl_certificate     /etc/letsencrypt/live/pm.example.com/fullchain.pem;   # certbot
#     ssl_certificate_key /etc/letsencrypt/live/pm.example.com/privkey.pem;     # certbot
#     include /etc/letsencrypt/options-ssl-nginx.conf;                          # certbot
#     ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;                            # certbot
#     client_max_body_size 12m;
#     location / { proxy_pass http://127.0.0.1:4000; ...same proxy_set_header as above... }
# }
# ...and the :80 block gets an http→https `return 301` added by certbot.
# Renewal is automatic via the certbot systemd timer; test with `sudo certbot renew --dry-run`.
