<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <title>Prismatix — Clarity in every project</title>

    <!-- PWA / installable (Add to Home Screen) -->
    <link rel="manifest" href="/manifest.webmanifest" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="Prismatix" />

    <!-- SEO -->
    <meta
      name="description"
      content="Prismatix turns scattered updates into Earned-Value truth — cost, schedule, risk and forecast in one calm, role-aware view. A PMBOK-aligned delivery platform for predictive, agile and hybrid projects."
    />
    <meta name="theme-color" content="#05070e" />
    <meta name="color-scheme" content="dark light" />

    <!-- Open Graph (paths are relative; make them absolute once a public domain is set) -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Prismatix" />
    <meta property="og:title" content="Prismatix — Clarity in every project" />
    <meta
      property="og:description"
      content="Earned Value at its heart: plan the work, watch it earn value in real time, steer with forecasts and change control, and close with confidence."
    />
    <meta property="og:image" content="/hero-dashboard.png" />
    <meta property="og:locale" content="en_US" />
    <meta property="og:locale:alternate" content="id_ID" />

    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Prismatix — Clarity in every project" />
    <meta
      name="twitter:description"
      content="A PMBOK-aligned delivery platform with Earned Value at its heart — cost, schedule, risk and forecast in one calm view."
    />
    <meta name="twitter:image" content="/hero-dashboard.png" />
    <script>
      // Apply theme before first paint to avoid a flash of the wrong mode.
      // Dark is the default: only an explicit 'light' choice opts out.
      (function () {
        try {
          if (localStorage.getItem('prima_theme') !== 'light') {
            document.documentElement.classList.add('dark');
          }
        } catch (e) {
          document.documentElement.classList.add('dark');
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
